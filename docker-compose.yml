version: '3.8'

services:
  db:
    image: mysql:8.0
    ports:
      - "${DB_EXTERNAL_PORT:-3306}:3306"
    environment:
      MYSQL_ROOT_PASSWORD: ${DB_PASS:-root123}
      MYSQL_DATABASE: ${DB_NAME:-bazi}
    volumes:
      - mysql_data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - bazi-network

  backend:
    build:
      context: ./src
      dockerfile: Dockerfile
    ports:
      - "${BACKEND_PORT:-8080}:${SERVER_PORT:-8080}"
    environment:
      DB_HOST: db
      DB_PORT: ${DB_PORT:-3306}
      DB_USER: ${DB_USER:-root}
      DB_PASS: ${DB_PASS:-root123}
      DB_NAME: ${DB_NAME:-bazi}
      JWT_SECRET: ${JWT_SECRET:-change-me-in-production}
      SERVER_PORT: ${SERVER_PORT:-8080}
    depends_on:
      db:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:${SERVER_PORT:-8080}/health || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - bazi-network

  frontend:
    build:
      context: ./vue
      dockerfile: Dockerfile
    ports:
      - "${FRONTEND_PORT:-80}:80"
    depends_on:
      - backend
    networks:
      - bazi-network

volumes:
  mysql_data:

networks:
  bazi-network:
    driver: bridge
